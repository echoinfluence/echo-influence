   <!-- CONTACT SECTION -->
<section class="contact-page">

    <div class="contact-container">

        <span class="contact-small">
            LET’S WORK TOGETHER
        </span>

        <h1>
            Ready to grow your brand?
        </h1>

        <p>
            Let’s create something premium together.
            Reach out and let’s talk business.
        </p>

        <!-- CONTACT FORM -->
        <form 
            action="https://formsubmit.co/echoinfluence01@gmail.com" 
            method="POST"
            class="contact-form"
        >

            <!-- Disable Captcha -->
            <input type="hidden" name="_captcha" value="false">

            <!-- Email Subject -->
            <input type="hidden" name="_subject" value="New Echo Influence Lead">

            <!-- Redirect After Submit -->
            <input type="hidden" name="_next" value="https://gentle-wave-03df62a10.7.azurestaticapps.net/contact.html">

            <input 
                type="text" 
                name="name" 
                placeholder="Your Name"
                required
            >

            <input 
                type="email" 
                name="email" 
                placeholder="Your Email"
                required
            >

            <input 
                type="tel" 
                name="phone" 
                placeholder="Your Phone Number"
            >

            <textarea 
                name="message" 
                placeholder="What can we help you create?"
                required
            ></textarea>

            <button type="submit">
                Send Message →
            </button>

        </form>

        <!-- CONTACT LINKS -->
        <div class="contact-links">
